services:
  api:
    build:
      context: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    command: ["strategylab-api"]
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: strategylab
      POSTGRES_PASSWORD: strategylab
      POSTGRES_DB: strategylab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
