services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      STRATEGYLAB_ENV: docker
      STRATEGYLAB_STORAGE_ROOT: /app/storage
      STRATEGYLAB_MODEL_ROOT: /app/artifacts/models
      STRATEGYLAB_DATASET_ROOT: /app/artifacts/datasets
      STRATEGYLAB_METADATA_DB_URL: postgresql+psycopg://strategylab:strategylab@postgres:5432/strategylab
      STRATEGYLAB_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: strategylab
      POSTGRES_USER: strategylab
      POSTGRES_PASSWORD: strategylab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
